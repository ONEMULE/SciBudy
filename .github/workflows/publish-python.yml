name: Publish Python

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[release]
      - name: Build package
        run: python -m build
      - name: Publish to PyPI via trusted publishing
        if: vars.PYPI_TRUSTED_PUBLISHING_ENABLED == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Publish to PyPI via API token
        if: vars.PYPI_TRUSTED_PUBLISHING_ENABLED != 'true' && secrets.PYPI_API_TOKEN != ''
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install twine
          python -m twine upload dist/*
      - name: Skip publish when PyPI publisher is not configured
        if: vars.PYPI_TRUSTED_PUBLISHING_ENABLED != 'true' && secrets.PYPI_API_TOKEN == ''
        run: echo "Skipping PyPI publish because neither PYPI_TRUSTED_PUBLISHING_ENABLED nor PYPI_API_TOKEN is configured."
